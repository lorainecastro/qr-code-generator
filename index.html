<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background decorative circles -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
    <div class="bg-circle bg-circle-4"></div>

    <div class="container">
        <div class="header">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <path d="M9 9h.01"></path>
                    <path d="M15 15h.01"></path>
                    <path d="M9 15h.01"></path>
                    <path d="M15 9h.01"></path>
                </svg>
            </div>
            <h1>QR Code Generator</h1>
            <p>Enter any text, URL, or message to instantly generate a scannable QR code.</p>
        </div>

        <form onsubmit="handleForm(event)">
            <div class="input-container">
                <label for="text">Enter Text or URL</label>
                <input type="text" id="text" placeholder="e.g., https://github.com/lorainecastro/qr-code-generator or Hello World" value="https://github.com/lorainecastro/qr-code-generator" required />
            </div>

            <button class="btn" type="submit">Generate QR Code</button>

            <div id="qrcode"></div>
            <a id="downloadLink" class="download-btn" style="display:none;">
                <i class="fas fa-download"></i> Download QR Code
            </a>
        </form>
    </div>

    <div class="notification" id="notification"></div>

    <!-- QRCode.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const textInput = document.getElementById('text');
        const qrContainer = document.getElementById('qrcode');
        const downloadLink = document.getElementById('downloadLink');
        const notification = document.getElementById('notification');
        let qrCodeInstance = null;

        function showNotification(message, type) {
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => {
                notification.className = 'notification';
            }, 3000);
        }

        function generateQR() {
            const text = textInput.value.trim();

            if (!text) {
                showNotification("Please enter some text or URL", "error");
                qrContainer.innerHTML = '';
                downloadLink.style.display = 'none';
                return;
            }

            // Clear previous QR
            qrContainer.innerHTML = '';

            // Generate QR code for display (200x200)
            qrCodeInstance = new QRCode(qrContainer, {
                text: text,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Generate higher-quality version for download with extra padding
            setTimeout(() => {
                const displayCanvas = qrContainer.querySelector('canvas');
                if (displayCanvas) {
                    // Create a larger canvas for download
                    const downloadCanvas = document.createElement('canvas');
                    const size = 400; // QR code size
                    const padding = 20; // Extra white padding (quiet zone ~20% of size)
                    downloadCanvas.width = size + 2 * padding;
                    downloadCanvas.height = size + 2 * padding;
                    const ctx = downloadCanvas.getContext('2d');

                    // White background
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, downloadCanvas.width, downloadCanvas.height);

                    // Draw the QR code centered
                    ctx.drawImage(displayCanvas, padding, padding, size, size);

                    // Set download link
                    downloadLink.href = downloadCanvas.toDataURL('image/png');
                    downloadLink.download = 'qrcode.png';
                    downloadLink.style.display = 'block';
                }
            }, 100);

            showNotification("QR Code generated successfully!", "success");
        }

        function handleForm(event) {
            event.preventDefault();
            generateQR();
        }

        // Generate on page load with default value
        window.onload = generateQR;

        // Mouse move parallax effect for background circles
        document.addEventListener("mousemove", function (e) {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const circles = document.querySelectorAll(".bg-circle");
            circles.forEach((circle, index) => {
                const speed = (index + 1) * 0.05;
                const translateX = x * 20 * speed - 10 * speed;
                const translateY = y * 20 * speed - 10 * speed;
                circle.style.transform = `translate(${translateX}px, ${translateY}px)`;
            });
        });
    </script>
</body>
</html>
