<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #10b981;
            --primary-gradient: linear-gradient(135deg, #10b981, #059669);
            --primary-hover: #059669;
            --secondary-color: #f43f5e;
            --secondary-gradient: linear-gradient(135deg, #f43f5e, #ec4899);
            --error-color: #ef4444;
            --success-color: #10b981;
            --text-color: #1f2937;
            --text-light: #6b7280;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative circles */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }

        .bg-circle-1 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(5, 150, 105, 0.15));
            top: -100px;
            right: 0px;
            animation: float 8s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.12), rgba(236, 72, 153, 0.12));
            bottom: 0px;
            left: 10%;
            animation: float 9s ease-in-out infinite 1s;
        }

        .bg-circle-3 {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.1));
            top: 20%;
            left: -50px;
            animation: float 7s ease-in-out infinite 0.5s;
        }

        .bg-circle-4 {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.1));
            bottom: 30%;
            right: 5%;
            animation: float 10s ease-in-out infinite 1.5s;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            z-index: 1;
            border: 1px solid #e2e8f0;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 10px;
            background: var(--primary-gradient);
            border-radius: 0 0 50px 50px;
            z-index: 2;
        }

        .container::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.1));
            border-radius: 0 0 0 100%;
            z-index: -1;
        }

        .container:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header .brand-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
            position: relative;
        }

        .header .brand-icon::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary-gradient);
            z-index: -1;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        .header .brand-icon svg {
            width: 30px;
            height: 30px;
            color: white;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 10px;
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-light);
            font-size: 16px;
            line-height: 1.5;
        }

        .input-container {
            margin-bottom: 25px;
        }

        .input-container label {
            font-weight: 500;
            color: var(--text-color);
            display: block;
            margin-bottom: 12px;
        }

        .input-container input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #f9fafb;
            font-size: 16px;
            color: #1a1a1a;
            transition: var(--transition);
        }

        .input-container input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .input-container input:hover {
            border-color: var(--primary-color);
        }

        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: var(--transition);
            z-index: -1;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.35);
            background: var(--primary-hover);
        }

        .btn:hover::before {
            left: 100%;
            transition: 0.7s;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* QR Code container - centered and smaller */
        #qrcode {
            margin: 30px auto 20px;
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            max-width: 240px; /* Limits the size */
        }

        #qrcode:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        #qrcode canvas {
            max-width: 100%;
            height: auto !important;
            border-radius: 8px;
        }

        /* Download button */
        .download-btn {
            display: block;
            margin: 15px auto 0;
            padding: 12px 24px;
            background: var(--secondary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
            width: fit-content;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(244, 63, 94, 0.35);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1000;
            transform: translateY(-20px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .success {
            background: var(--primary-gradient);
        }

        .error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .show {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .header h1 {
                font-size: 26px;
            }
            .header p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Background decorative circles -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
    <div class="bg-circle bg-circle-4"></div>

    <div class="container">
        <div class="header">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <path d="M9 9h.01"></path>
                    <path d="M15 15h.01"></path>
                    <path d="M9 15h.01"></path>
                    <path d="M15 9h.01"></path>
                </svg>
            </div>
            <h1>QR Code Generator</h1>
            <p>Enter any text, URL, or message to instantly generate a scannable QR code.</p>
        </div>

        <form onsubmit="handleForm(event)">
            <div class="input-container">
                <label for="text">Enter Text or URL</label>
                <input type="text" id="text" placeholder="e.g., https://x.ai or Hello World" value="https://x.ai" required />
            </div>

            <button class="btn" type="submit">Generate QR Code</button>

            <div id="qrcode"></div>
            <a id="downloadLink" class="download-btn" style="display:none;">
                <i class="fas fa-download"></i> Download QR Code
            </a>
        </form>
    </div>

    <div class="notification" id="notification"></div>

    <!-- QRCode.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const textInput = document.getElementById('text');
        const qrContainer = document.getElementById('qrcode');
        const downloadLink = document.getElementById('downloadLink');
        const notification = document.getElementById('notification');
        let qrCodeInstance = null;

        function showNotification(message, type) {
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => {
                notification.className = 'notification';
            }, 3000);
        }

        function generateQR() {
            const text = textInput.value.trim();

            if (!text) {
                showNotification("Please enter some text or URL", "error");
                qrContainer.innerHTML = '';
                downloadLink.style.display = 'none';
                return;
            }

            // Clear previous QR
            qrContainer.innerHTML = '';

            // Generate QR code for display (200x200)
            qrCodeInstance = new QRCode(qrContainer, {
                text: text,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Generate higher-quality version for download with extra padding
            setTimeout(() => {
                const displayCanvas = qrContainer.querySelector('canvas');
                if (displayCanvas) {
                    // Create a larger canvas for download
                    const downloadCanvas = document.createElement('canvas');
                    const size = 400; // QR code size
                    const padding = 20; // Extra white padding (quiet zone ~20% of size)
                    downloadCanvas.width = size + 2 * padding;
                    downloadCanvas.height = size + 2 * padding;
                    const ctx = downloadCanvas.getContext('2d');

                    // White background
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, downloadCanvas.width, downloadCanvas.height);

                    // Draw the QR code centered
                    ctx.drawImage(displayCanvas, padding, padding, size, size);

                    // Set download link
                    downloadLink.href = downloadCanvas.toDataURL('image/png');
                    downloadLink.download = 'qrcode.png';
                    downloadLink.style.display = 'block';
                }
            }, 100);

            showNotification("QR Code generated successfully!", "success");
        }

        function handleForm(event) {
            event.preventDefault();
            generateQR();
        }

        // Generate on page load with default value
        window.onload = generateQR;

        // Mouse move parallax effect for background circles
        document.addEventListener("mousemove", function (e) {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const circles = document.querySelectorAll(".bg-circle");
            circles.forEach((circle, index) => {
                const speed = (index + 1) * 0.05;
                const translateX = x * 20 * speed - 10 * speed;
                const translateY = y * 20 * speed - 10 * speed;
                circle.style.transform = `translate(${translateX}px, ${translateY}px)`;
            });
        });
    </script>
</body>
</html>
